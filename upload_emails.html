});
const db = firebase.database();

function log(msg, err) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (err) line.className = 'err';
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

function setProgress(pct) { document.getElementById('bar').style.width = pct + '%'; }
function setStatus(txt)    { document.getElementById('status').innerHTML = txt; }

async function run() {
  await new Promise(resolve => {
    db.ref('.info/connected').on('value', snap => { if (snap.val()) resolve(); });
  });

  const entries = [
    ...Object.entries(JV_EMAILS).map(([k,v])  => ({ path: 'tryouts2026/jv/email/'      + k, email: v })),
    ...Object.entries(VAR_EMAILS).map(([k,v]) => ({ path: 'tryouts2026/varsity/email/' + k, email: v })),
  ];

  const total = entries.length;
  setStatus(`<strong>Uploading ${total} email entries&#8230;</strong>`);
  log(`Starting: ${Object.keys(JV_EMAILS).length} JV + ${Object.keys(VAR_EMAILS).length} Varsity`);

  let done = 0, errors = 0;
  const BATCH = 20;
  for (let i = 0; i < entries.length; i += BATCH) {
    const batch = entries.slice(i, i + BATCH);
    await Promise.all(batch.map(e =>
      db.ref(e.path).set(e.email)
        .then(() => { done++; setProgress(Math.round(done / total * 100)); })
        .catch(err => { errors++; log('&#10007; ' + e.path + ': ' + err.message, true); })
    ));
    log('&#10003; ' + Math.min(i + BATCH, total) + ' / ' + total + ' written');
  }

  setProgress(100);
  if (errors === 0) {
    setStatus('<strong style="color:#4ade80">Done! ' + total + ' emails uploaded.</strong>');
    document.getElementById('done').style.display = 'block';
    log('All done — no errors.');
  } else {
    setStatus('<strong style="color:#f87171">Finished with ' + errors + ' error(s).</strong>');
  }
}
