<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLD Soccer — JV Soccer Player Check-In</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #ce0e2d;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
      --white: #ffffff;
      --green: #4ade80;
      --yellow: #facc15;
      --blue: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* ── Header ── */
    .header {
      background: var(--red);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-left { display: flex; flex-direction: column; gap: 2px; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: white; letter-spacing: 1px; }
    .header-sub { color: rgba(255,255,255,0.75); font-size: 13px; }

    /* ── Sync bar ── */
    .sync-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .sync-dot.online  { background: var(--green); }
    .sync-dot.syncing { background: var(--yellow); animation: pulse 0.8s infinite; }
    .sync-dot.offline { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Controls ── */
    .controls {
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 320px; }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 34px 9px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
    }
    .search-wrap input:focus { outline: none; border-color: var(--red); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 0;
    }
    .search-clear:hover { color: var(--white); }
    .stats-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      white-space: nowrap;
      color: var(--muted);
    }
    .stats-pill strong { color: var(--green); }
    .stats-pill .email-count { color: var(--blue); }
    .filter-btns { display: flex; gap: 6px; }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .15s, color .15s;
    }
    .filter-btn.active { border-color: var(--red); color: var(--white); }
    .btn-add-player {
      margin-left: auto;
      background: var(--red);
      border: none;
      border-radius: 6px;
      padding: 9px 16px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
    .btn-add-player:hover { background: #a80b24; }

    /* ── Table ── */
    .table-wrap { padding: 0 24px 48px; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 680px; }
    thead th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--bg);
      z-index: 2;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    tbody tr:hover { background: var(--surface); }
    tbody tr.assigned  { border-left: 3px solid var(--green); }
    tbody tr.unassigned { border-left: 3px solid transparent; }
    td { padding: 9px 12px; font-size: 14px; vertical-align: middle; }
    td.row-num  { color: var(--muted); font-size: 12px; width: 36px; }
    td.p-name   { font-weight: 500; min-width: 160px; }
    td.p-grade  { color: var(--muted); width: 44px; }
    td.p-num    { width: 120px; }
    td.p-email  { min-width: 220px; }
    td.p-status { width: 100px; }

    .num-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      width: 90px;
      text-align: center;
      transition: border-color .15s;
    }
    .num-input:focus { outline: none; border-color: var(--red); }
    .num-input.has-value { border-color: var(--green); color: var(--green); }

    /* ── Email cell ── */
    .email-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .email-display {
      font-size: 13px;
      color: var(--blue);
      cursor: pointer;
      border-radius: 4px;
      padding: 3px 4px;
      transition: background .12s;
      word-break: break-all;
    }
    .email-display:hover { background: rgba(96,165,250,.12); }
    .email-display.empty { color: var(--muted); font-style: italic; }
    .email-input {
      background: var(--surface2);
      border: 1px solid var(--blue);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
      min-width: 180px;
      outline: none;
    }
    .email-input:focus { border-color: #93c5fd; }

    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .badge.done    { background: rgba(74,222,128,.15); color: var(--green); }
    .badge.pending { background: var(--surface2); color: var(--muted); }
    .badge.walkon  { background: rgba(250,204,21,.15); color: var(--yellow); }

    tbody tr.walkon-row td.p-name::after {
      content: ' walk-on';
      font-size: 10px;
      font-weight: 400;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-left: 6px;
    }
    .no-results { text-align: center; padding: 56px 0; color: var(--muted); font-size: 15px; }


    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px; width: 380px; max-width: 90vw;
    }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .field input, .field select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 9px 12px; color: var(--text);
      font-size: 14px; font-family: 'DM Sans', sans-serif;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--red); }
    .field select option { background: var(--surface2); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-submit {
      flex: 1; background: var(--red); border: none; border-radius: 6px;
      padding: 10px; color: white; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-submit:hover { background: #a80b24; }
    .btn-cancel {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 10px 16px; color: var(--muted);
      font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-cancel:hover { color: var(--white); }
    .modal-error { color: #f87171; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>
<body>


<div class="header">
  <img src="../6 Star Dunbar Crest.png" alt="PLD Crest" style="height:52px;width:auto;flex-shrink:0;">
  <div class="header-left">
    <div class="header-title">PLD Soccer &#8212; JV Soccer Player Check-In</div>
    <div class="header-sub">JV Soccer tryout numbers &#8212; sync live to JV Soccer evaluation forms</div>
  </div>
</div>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-text">Connecting&#8230;</span>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search by name or grade&#8230;" oninput="renderTable()">
    <button class="search-clear" onclick="document.getElementById('search').value='';renderTable()">&#10005;</button>
  </div>
  <div class="stats-pill">
    Checked in: <strong id="count-assigned">0</strong> / <strong id="count-total">0</strong>
    &nbsp;&#183;&nbsp; Emails: <span class="email-count" id="count-emails">0</span>
  </div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all"       onclick="setFilter(this)">All</button>
    <button class="filter-btn"        data-filter="assigned"  onclick="setFilter(this)">Assigned</button>
    <button class="filter-btn"        data-filter="unassigned" onclick="setFilter(this)">Unassigned</button>
  </div>
  <button class="btn-add-player" onclick="openModal()">+ Add Player</button>
</div>

<!-- Add Player Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">Add Walk-On Player</div>
    <div class="field">
      <label>Full Name *</label>
      <input type="text" id="new-name" placeholder="First Last" autocomplete="off">
    </div>
    <div class="field">
      <label>Grade *</label>
      <select id="new-grade">
        <option value="">Select grade&#8230;</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option>
      </select>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="new-email" placeholder="student@school.edu">
    </div>
    <div class="field">
      <label>Tryout # (optional)</label>
      <input type="text" id="new-num" placeholder="Leave blank to assign later">
    </div>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitNewPlayer()">Add Player</button>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th></th>
        <th>Name</th>
        <th>Gr</th>
        <th>Tryout #</th>
        <th>Email</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="no-results" style="display:none">No players found</div>
</div>

<script>
const FIREBASE_CONFIG = {

const PLAYERS = [{"id":"slyq4vtv","name":"Jose Abad","grade":"8"},{"id":"fdlfo1wc","name":"Juan Abad","grade":"10"},{"id":"i0tnz8c1","name":"Yaseen Agoub","grade":"10"},{"id":"3kskrkge","name":"Brandon Aguilar Pérez","grade":"8"},{"id":"mztub2e5","name":"Grady Alberti","grade":"10"},{"id":"genrd9e0","name":"Abdul Aziz Aljanabi","grade":"9"},{"id":"nldhrzat","name":"Antony Alvarez","grade":"9"},{"id":"azb1uosq","name":"Samuel Armstrong","grade":"10"},{"id":"daao81rr","name":"Jesus Bautista Martinez","grade":"10"},{"id":"di2x1ns1","name":"Ecson Bermudez","grade":"10"},{"id":"rp106o8r","name":"Kai Bishop","grade":"10"},{"id":"by2xjxqw","name":"Predi Bomolo","grade":"10"},{"id":"j4fdqv6c","name":"Preston Brassine","grade":"9"},{"id":"4g4ibbxt","name":"Colton Brewer","grade":"10"},{"id":"zsj8ng38","name":"Justin Calixtro","grade":"10"},{"id":"fydmfuon","name":"Williams Canelo","grade":"9"},{"id":"lkdfsqx0","name":"Pablo Castillo","grade":"8"},{"id":"r694r6xl","name":"Jonathan Chavez","grade":"10"},{"id":"evxxfxt8","name":"Dylan Collins","grade":"10"},{"id":"x4yhulsv","name":"Carter Crovo","grade":"9"},{"id":"x72tqw5n","name":"Brandon Cuellar","grade":"9"},{"id":"cvht5d9m","name":"Kellen Daugherty","grade":"10"},{"id":"4hhcowjz","name":"Dylan Delgado","grade":"8"},{"id":"2t59eo0b","name":"Kieran Derbyshire","grade":"10"},{"id":"8i9wdua5","name":"Oscar Diaz","grade":"10"},{"id":"09qe0tdc","name":"Ulises Diaz","grade":"10"},{"id":"2u1m21d4","name":"Cash Donoghue","grade":"10"},{"id":"jcskc16p","name":"Santi Duque","grade":"10"},{"id":"gyzkakj0","name":"Pablo Enriquez","grade":"10"},{"id":"c4y5e58d","name":"Carson Fair","grade":"10"},{"id":"ulf8nup5","name":"Alex Fidowicz","grade":"9"},{"id":"tijgz97s","name":"Ronan Flemming","grade":"9"},{"id":"khgpl011","name":"Miguel E Garcia Salgado","grade":"10"},{"id":"x65xeggi","name":"Donnie Gonzalez","grade":"10"},{"id":"lsrcc3t8","name":"Angel Gonzalez","grade":"8"},{"id":"spq8oxir","name":"Miguel Gracia","grade":"9"},{"id":"gxt3uy 1mr","name":"Kevin Perez","grade":"10"},{"id":"hnstomko","name":"Carter Peyton","grade":"10"},{"id":"7zo1qer7","name":"Arpan Pokhrel","grade":"10"},{"id":"oosrcn8r","name":"Speed Price","grade":"10"},{"id":"47cxddgv","name":"Oliver Pulito","grade":"10"},{"id":"6hio9f19","name":"Isaac Qualls","grade":"9"},{"id":"pz5d4hfw","name":"Angel Ramirez","grade":"10"},{"id":"zwlp1390","name":"Andrew Roche","grade":"8"},{"id":"1ye61l5c","name":"Damon Rodriguez-Hernandez","grade":"9"},{"id":"qj3dn5ah","name":"Brandon Romero","grade":"9"},{"id":"5yk4mvyy","name":"Johncarlo Santiago","grade":"10"},{"id":"fdcgijan","name":"Hugh Seo","grade":"10"},{"id":"oc3tsqtt","name":"Joochan Shin","grade":"10"},{"id":"buxq1y49","name":"Nicolas Silva","grade":"10"},{"id":"dh8cmpw5","name":"Vidal Simo","grade":"10"},{"id":"ew81mueb","name":"Austin Soriano","grade":"10"},{"id":"w47sq0xd","name":"Killian Sullivan","grade":"8"},{"id":"h8yptitg","name":"Liam Terry","grade":"8"},{"id":"4awkk306","name":"Ulisses Torres Rodriguez","grade":"9"},{"id":"pwfsdgb5","name":"Alex Wang","grade":"9"},{"id":"cznbdkiw","name":"Mark Wilson","grade":"10"},{"id":"56k11k2s","name":"Augusten Zuliani","grade":"9"}];

// ── State ─────────────────────────────────────────────────────────────────────
let db, firebaseReady = false;
let checkinData  = {};   // {playerKey: {name, grade, num, ts}}
let emailData    = {};   // {playerKey: email}
let extraPlayers = [];    // walk-ons
let currentFilter = 'all';
let editingEmailKey = null; // which player's email is being edited

function playerKey(name) {
  return name.toLowerCase().replace(/[^a-z0-9]/g, '_');
}
function uid() {
  return Math.random().toString(36).slice(2, 10);
}

// ── Firebase ──────────────────────────────────────────────────────────────────
function initFirebase() {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();

  db.ref('.info/connected').on('value', snap => {
    firebaseReady = !!snap.val();
    setSyncStatus(
      firebaseReady ? 'online' : 'offline',
      firebaseReady ? 'Connected — numbers sync live to evaluation forms' : 'Offline — will sync when reconnected'
    );
  });

  db.ref('tryouts2026/jv/checkin').on('value', snap => {
    checkinData = snap.val() || {};
    renderTable();
  });

  db.ref('tryouts2026/jv/email').on('value', snap => {
    emailData = snap.val() || {};
    renderTable();
  });

  db.ref('tryouts2026/jv/extra_players').on('value', snap => {
    const data = snap.val() || {};
    extraPlayers = Object.values(data).sort((a, b) => a.name.localeCompare(b.name));
    renderTable();
  });
}

function setSyncStatus(state, text) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
}

// ── Save tryout number ────────────────────────────────────────────────────────
function saveNum(player, rawVal) {
  if (!firebaseReady) return;
  const val = rawVal.trim();
  const key = playerKey(player.name);
  setSyncStatus('syncing', 'Saving…');
  const done = () => setSyncStatus('online', 'Connected — numbers sync live to evaluation forms');
  if (val) {
    db.ref('tryouts2026/jv/checkin/' + key).set({
      name: player.name, grade: player.grade, num: val, ts: Date.now()
    }).then(done);
  } else {
    db.ref('tryouts2026/jv/checkin/' + key).remove().then(done);
  }
}

// ── Save email ────────────────────────────────────────────────────────────────
function saveEmail(name, email) {
  if (!firebaseReady) return;
  const key = playerKey(name);
  setSyncStatus('syncing', 'Saving…');
  const done = () => setSyncStatus('online', 'Connected — numbers sync live to evaluation forms');
  if (email.trim()) {
    db.ref('tryouts2026/jv/email/' + key).set(email.trim()).then(done);
  } else {
    db.ref('tryouts2026/jv/email/' + key).remove().then(done);
  }
}

// ── Email inline editing ──────────────────────────────────────────────────────
function startEditEmail(key, currentEmail) {
  editingEmailKey = key;
  renderTable();
  // Focus the input after render
  setTimeout(() => {
    const inp = document.getElementById('email-inp-' + key);
    if (inp) { inp.focus(); inp.select(); }
  }, 30);
}

function commitEmail(name) {
  const key = playerKey(name);
  const inp = document.getElementById('email-inp-' + key);
  if (!inp) return;
  saveEmail(name, inp.value);
  editingEmailKey = null;
  // Don't re-render — Firebase listener will trigger it
}

function cancelEmail() {
  editingEmailKey = null;
  renderTable();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderTable() {
  const query  = document.getElementById('search').value.toLowerCase().trim();
  const tbody  = document.getElementById('tbody');
  const allPlayers = [...PLAYERS, ...extraPlayers.map(p => ({ ...p, walkon: true }))];
  let assigned = 0, emailCount = 0;
  let visibleCount = 0;
  let html = '';

  allPlayers.forEach((p, i) => {
    const key       = playerKey(p.name);
    const rec       = checkinData[key];
    const num       = rec ? rec.num : '';
    const email     = emailData[key] || '';
    const isAssigned = !!num;
    if (isAssigned) assigned++;
    if (email) emailCount++;

    if (query && !p.name.toLowerCase().includes(query) && !String(p.grade).includes(query) && !email.toLowerCase().includes(query)) return;
    if (currentFilter === 'assigned'   && !isAssigned) return;
    if (currentFilter === 'unassigned' &&  isAssigned) return;

    visibleCount++;
    const isEditingEmail = (editingEmailKey === key);

    let emailCell;
    if (isEditingEmail) {
      emailCell = `<div class="email-cell">
        <input
          id="email-inp-${key}"
          class="email-input"
          type="email"
          value="${email}"
          placeholder="email@school.edu"
          onblur="commitEmail('${p.name.replace(/'/g, "\'")}');"
          onkeydown="if(event.key==='Enter')commitEmail('${p.name.replace(/'/g, "\'")}'); if(event.key==='Escape')cancelEmail();"
        >
      </div>`;
    } else {
      emailCell = `<div class="email-cell">
        <span
          class="email-display${email ? '' : ' empty'}"
          onclick="startEditEmail('${key}', '${email}')"
          title="${email ? 'Click to edit' : 'Click to add email'}"
        >${email || 'Add email…'}</span>
      </div>`;
    }

    html += `
      <tr class="${isAssigned ? 'assigned' : 'unassigned'}${p.walkon ? ' walkon-row' : ''}">
        <td class="row-num">${i + 1}</td>
        <td class="p-name">${p.name}</td>
        <td class="p-grade">${p.grade}</td>
        <td class="p-num">
          <input
            type="text"
            class="num-input${num ? ' has-value' : ''}"
            placeholder="—"
            value="${num}"
            data-name="${p.name}"
            data-grade="${p.grade}"
            onblur="handleBlur(this)"
            onkeydown="handleKey(event, this)"
          >
        </td>
        <td class="p-email">${emailCell}</td>
        <td class="p-status">
          <span class="badge ${isAssigned ? 'done' : 'pending'}">${isAssigned ? '✓ T-' + num : 'Pending'}</span>
        </td>
      </tr>`;
  });

  tbody.innerHTML = html;
  document.getElementById('count-assigned').textContent = assigned;
  document.getElementById('count-total').textContent = allPlayers.length;
  document.getElementById('count-emails').textContent = emailCount;
  document.getElementById('no-results').style.display = visibleCount === 0 ? 'block' : 'none';
}

function handleBlur(input) {
  saveNum({ name: input.dataset.name, grade: input.dataset.grade }, input.value);
}

function handleKey(e, input) {
  if (e.key === 'Enter') {
    e.preventDefault();
    input.blur();
    const inputs = [...document.querySelectorAll('.num-input')];
    const idx = inputs.indexOf(input);
    if (idx < inputs.length - 1) inputs[idx + 1].focus();
  }
  if (e.key === 'Escape') { input.blur(); }
}

function setFilter(btn) {
  currentFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

// ── Add Player Modal ──────────────────────────────────────────────────────────
function openModal() {
  ['new-name','new-grade','new-email','new-num'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('new-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function submitNewPlayer() {
  const name  = document.getElementById('new-name').value.trim();
  const grade = document.getElementById('new-grade').value;
  const email = document.getElementById('new-email').value.trim();
  const num   = document.getElementById('new-num').value.trim();

  if (!name)  { showModalError('Name is required.'); return; }
  if (!grade) { showModalError('Grade is required.'); return; }

  const allNames = [...PLAYERS, ...extraPlayers].map(p => p.name.toLowerCase());
  if (allNames.includes(name.toLowerCase())) {
    showModalError('A player with that name already exists.');
    return;
  }

  const id = uid();
  const player = { id, name, grade };
  setSyncStatus('syncing', 'Saving…');
  const done = () => setSyncStatus('online', 'Connected — numbers sync live to evaluation forms');

  db.ref('tryouts2026/jv/extra_players/' + id).set(player).then(() => {
    const tasks = [];
    if (email) tasks.push(db.ref('tryouts2026/jv/email/' + playerKey(name)).set(email));
    if (num)   tasks.push(db.ref('tryouts2026/jv/checkin/' + playerKey(name)).set({ name, grade, num, ts: Date.now() }));
    return Promise.all(tasks);
  }).then(done);

  closeModal();
}

function showModalError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.style.display = 'block';
}


// ── Init ──────────────────────────────────────────────────────────────────────
initFirebase();
</script>
