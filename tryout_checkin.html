<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLD Soccer — Player Check-In</title>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #ce0e2d;
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
      --white: #ffffff;
      --green: #4ade80;
      --yellow: #facc15;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* ── Header ─────────────────────────────────────────────────────────── */
    .header {
      background: var(--red);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: flex-start;
    }
    .header-left { display: flex; flex-direction: column; gap: 2px; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: white; letter-spacing: 1px; }
    .header-sub { color: rgba(255,255,255,0.75); font-size: 13px; }

    /* ── Sync bar ───────────────────────────────────────────────────────── */
    .sync-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .sync-dot.online  { background: var(--green); }
    .sync-dot.syncing { background: var(--yellow); animation: pulse 0.8s infinite; }
    .sync-dot.offline { background: #f87171; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Controls ───────────────────────────────────────────────────────── */
    .controls {
      padding: 14px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 380px; }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 34px 9px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
    }
    .search-wrap input:focus { outline: none; border-color: var(--red); }
    .search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 0;
    }
    .search-clear:hover { color: var(--white); }

    .stats-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      white-space: nowrap;
      color: var(--muted);
    }
    .stats-pill strong { color: var(--green); }

    .filter-btns { display: flex; gap: 6px; }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: border-color .15s, color .15s;
    }
    .filter-btn.active { border-color: var(--red); color: var(--white); }


    /* ── Table ──────────────────────────────────────────────────────────── */
    .table-wrap { padding: 0 24px 48px; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: var(--bg);
      z-index: 2;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    tbody tr:hover { background: var(--surface); }
    tbody tr.assigned  { border-left: 3px solid var(--green); }
    tbody tr.unassigned { border-left: 3px solid transparent; }
    td { padding: 9px 12px; font-size: 14px; vertical-align: middle; }
    td.row-num  { color: var(--muted); font-size: 12px; width: 36px; }
    td.p-name   { font-weight: 500; }
    td.p-grade  { color: var(--muted); width: 50px; }
    td.p-num    { width: 140px; }
    td.p-status { width: 100px; }

    .num-input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      width: 100px;
      text-align: center;
      transition: border-color .15s;
    }
    .num-input:focus { outline: none; border-color: var(--red); }
    .num-input.has-value { border-color: var(--green); color: var(--green); }

    .badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .badge.done    { background: rgba(74,222,128,.15); color: var(--green); }
    .badge.pending { background: var(--surface2); color: var(--muted); }

    .no-results { text-align: center; padding: 56px 0; color: var(--muted); font-size: 15px; }

    /* ── PASSWORD GATE ── */
    .pw-gate { display:none; position:fixed; inset:0; background:#0f0f0f; z-index:9999; align-items:center; justify-content:center; }
    .pw-gate.visible { display:flex; }
    .pw-box { text-align:center; width:320px; padding:48px 36px; }
    .pw-box-crest { width:80px; height:80px; margin:0 auto 20px; }
    .pw-box-crest img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 4px 16px rgba(206,14,45,0.4)); }
    .pw-box-eyebrow { font-size:10px; letter-spacing:4px; text-transform:uppercase; color:#e8324f; font-weight:600; margin-bottom:6px; }
    .pw-box-title { font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:3px; color:#fff; margin-bottom:6px; }
    .pw-box-sub { font-size:13px; color:rgba(255,255,255,0.35); margin-bottom:24px; line-height:1.5; }
    .pw-input { width:100%; background:#1a1a1a; border:1px solid #333; color:#fff; border-radius:8px; padding:11px 14px; font-family:'DM Sans',sans-serif; font-size:15px; outline:none; text-align:center; letter-spacing:3px; margin-bottom:10px; transition:border-color .2s; }
    .pw-input:focus { border-color:var(--red); }
    .pw-input.error { border-color:#e84545; animation:shake .3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .pw-error { font-size:12px; color:#e84545; min-height:16px; margin-bottom:8px; }
    .pw-submit { width:100%; background:var(--red); color:#fff; border:none; border-radius:8px; padding:12px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700; cursor:pointer; transition:background .15s; }
    .pw-submit:hover { background:#a80b24; }
    .pw-back { display:inline-block; margin-top:12px; font-size:12px; color:rgba(255,255,255,0.25); text-decoration:none; }
    .pw-back:hover { color:rgba(255,255,255,0.5); }

    /* ── Add Player button ──────────────────────────────────────────────── */
    .btn-add-player {
      margin-left: auto;
      background: var(--red);
      border: none;
      border-radius: 6px;
      padding: 9px 16px;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }
    .btn-add-player:hover { background: #a80b24; }

    /* ── Walk-on badge ──────────────────────────────────────────────────── */
    .badge.walkon { background: rgba(250,204,21,.15); color: var(--yellow); }
    tbody tr.walkon-row td.p-name::after {
      content: ' walk-on';
      font-size: 10px;
      font-weight: 400;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-left: 6px;
    }

    /* ── Modal ──────────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 360px;
      max-width: 90vw;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
    .field input, .field select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--red); }
    .field select option { background: var(--surface2); }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-submit {
      flex: 1;
      background: var(--red);
      border: none;
      border-radius: 6px;
      padding: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-submit:hover { background: #a80b24; }
    .btn-cancel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-cancel:hover { color: var(--white); }
    .modal-error { color: #f87171; font-size: 13px; margin-top: 8px; display: none; }
  </style>
</head>

<div class="pw-gate visible" id="pw-gate">
  <div class="pw-box">
    <div class="pw-box-crest"><img src="6 Star Dunbar Crest.png" alt="PLD" onerror="this.style.display='none'"></div>
    <div class="pw-box-eyebrow">Check-In Staff</div>
    <div class="pw-box-title">Player Check-In</div>
    <div class="pw-box-sub">Enter your password to continue.</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="Password"
      onkeydown="if(event.key==='Enter')submitGate()"
      oninput="document.getElementById('pw-error').textContent=''">
    <div class="pw-error" id="pw-error"></div>
    <button class="pw-submit" onclick="submitGate()">Enter</button>
    <a class="pw-back" href="tryouts.html">← Back</a>
  </div>
</div>

<div class="header">
  <img src="6 Star Dunbar Crest.png" alt="PLD Crest" style="height:52px;width:auto;flex-shrink:0;">
  <div class="header-left">
    <div class="header-title">PLD Soccer — Player Check-In</div>
    <div class="header-sub">Assign tryout numbers as players arrive · numbers sync live to evaluation forms</div>
  </div>
</div>

<div class="sync-bar">
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-text">Connecting…</span>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="Search by name or grade…" oninput="renderTable()">
    <button class="search-clear" onclick="document.getElementById('search').value='';renderTable()">✕</button>
  </div>
  <div class="stats-pill">Checked in: <strong id="count-assigned">0</strong> / <strong id="count-total">135</strong></div>
  <div class="filter-btns">
    <button class="filter-btn active" data-filter="all"      onclick="setFilter(this)">All</button>
    <button class="filter-btn"        data-filter="assigned"  onclick="setFilter(this)">Assigned</button>
    <button class="filter-btn"        data-filter="unassigned" onclick="setFilter(this)">Unassigned</button>
  </div>
  <button class="btn-add-player" onclick="openModal()">+ Add Player</button>
</div>

<!-- Add Player Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">Add Walk-On Player</div>
    <div class="field">
      <label>Full Name *</label>
      <input type="text" id="new-name" placeholder="First Last" autocomplete="off">
    </div>
    <div class="field">
      <label>Grade *</label>
      <select id="new-grade">
        <option value="">Select grade…</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
      </select>
    </div>
    <div class="field">
      <label>Tryout # (optional)</label>
      <input type="text" id="new-num" placeholder="Leave blank to assign later">
    </div>
    <div class="modal-error" id="modal-error"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="submitNewPlayer()">Add Player</button>
    </div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th></th>
        <th>Name</th>
        <th>Gr</th>
        <th>Tryout #</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="no-results" style="display:none">No players found</div>
</div>

// ── State ─────────────────────────────────────────────────────────────────────
let db, firebaseReady = false;
let checkinData  = {};   // {playerKey: {name, grade, num, ts}}
let extraPlayers = [];   // walk-ons added at check-in [{id, name, grade}]
let currentFilter = 'all';

function playerKey(name) {
  return name.toLowerCase().replace(/[^a-z0-9]/g, '_');
}

function uid() {
  return Math.random().toString(36).slice(2, 10);
}

// ── Firebase ──────────────────────────────────────────────────────────────────
function initFirebase() {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();

  db.ref('.info/connected').on('value', snap => {
    firebaseReady = !!snap.val();
    setSyncStatus(
      firebaseReady ? 'online' : 'offline',
      firebaseReady ? 'Connected — numbers sync live to evaluation forms' : 'Offline — will sync when reconnected'
    );
  });

  // Checkin numbers
  db.ref('tryouts2026/checkin').on('value', snap => {
    checkinData = snap.val() || {};
    renderTable();
  });

  // Walk-on players added at check-in
  db.ref('tryouts2026/extra_players').on('value', snap => {
    const data = snap.val() || {};
    extraPlayers = Object.values(data).sort((a, b) => a.name.localeCompare(b.name));
    renderTable();
  });
}

function setSyncStatus(state, text) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
}

// ── Save tryout number ────────────────────────────────────────────────────────
function saveNum(player, rawVal) {
  if (!firebaseReady) return;
  const val = rawVal.trim();
  const key = playerKey(player.name);
  setSyncStatus('syncing', 'Saving…');
  const done = () => setSyncStatus('online', 'Connected — numbers sync live to evaluation forms');
  if (val) {
    db.ref('tryouts2026/checkin/' + key).set({
      name: player.name,
      grade: player.grade,
      num: val,
      ts: Date.now()
    }).then(done);
  } else {
    db.ref('tryouts2026/checkin/' + key).remove().then(done);
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderTable() {
  const query  = document.getElementById('search').value.toLowerCase().trim();
  const tbody  = document.getElementById('tbody');
  const allPlayers = [...PLAYERS, ...extraPlayers.map(p => ({ ...p, walkon: true }))];
  let assigned = 0;
  let visibleCount = 0;
  let html = '';

  allPlayers.forEach((p, i) => {
    const key  = playerKey(p.name);
    const rec  = checkinData[key];
    const num  = rec ? rec.num : '';
    const isAssigned = !!num;
    if (isAssigned) assigned++;

    if (query && !p.name.toLowerCase().includes(query) && !String(p.grade).includes(query)) return;
    if (currentFilter === 'assigned'   && !isAssigned) return;
    if (currentFilter === 'unassigned' &&  isAssigned) return;

    visibleCount++;
    html += `
      <tr class="${isAssigned ? 'assigned' : 'unassigned'}${p.walkon ? ' walkon-row' : ''}">
        <td class="row-num">${i + 1}</td>
        <td class="p-name">${p.name}</td>
        <td class="p-grade">${p.grade}</td>
        <td class="p-num">
          <input
            type="text"
            class="num-input${num ? ' has-value' : ''}"
            placeholder="—"
            value="${num}"
            data-name="${p.name}"
            data-grade="${p.grade}"
            onblur="handleBlur(this)"
            onkeydown="handleKey(event, this)"
          >
        </td>
        <td class="p-status">
          <span class="badge ${isAssigned ? 'done' : 'pending'}">${isAssigned ? '✓ T-' + num : 'Pending'}</span>
        </td>
      </tr>`;
  });

  tbody.innerHTML = html;
  document.getElementById('count-assigned').textContent = assigned;
  document.getElementById('count-total').textContent = allPlayers.length;
  document.getElementById('no-results').style.display = visibleCount === 0 ? 'block' : 'none';
}

function handleBlur(input) {
  saveNum({ name: input.dataset.name, grade: input.dataset.grade }, input.value);
}

function handleKey(e, input) {
  if (e.key === 'Enter') {
    e.preventDefault();
    input.blur();
    const inputs = [...document.querySelectorAll('.num-input')];
    const idx = inputs.indexOf(input);
    if (idx < inputs.length - 1) inputs[idx + 1].focus();
  }
  if (e.key === 'Escape') { input.blur(); }
}

function setFilter(btn) {
  currentFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

// ── Add Player Modal ──────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('new-name').value = '';
  document.getElementById('new-grade').value = '';
  document.getElementById('new-num').value = '';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('new-name').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function submitNewPlayer() {
  const name  = document.getElementById('new-name').value.trim();
  const grade = document.getElementById('new-grade').value;
  const num   = document.getElementById('new-num').value.trim();
  const errEl = document.getElementById('modal-error');

  if (!name) { showModalError('Name is required.'); return; }
  if (!grade) { showModalError('Grade is required.'); return; }

  // Check for duplicate name
  const allNames = [...PLAYERS, ...extraPlayers].map(p => p.name.toLowerCase());
  if (allNames.includes(name.toLowerCase())) {
    showModalError('A player with that name already exists.');
    return;
  }

  const id = uid();
  const player = { id, name, grade };
  setSyncStatus('syncing', 'Saving…');
  const done = () => setSyncStatus('online', 'Connected — numbers sync live to evaluation forms');

  // Save to extra_players
  db.ref('tryouts2026/extra_players/' + id).set(player).then(() => {
    // If a tryout number was entered, save that too
    if (num) {
      db.ref('tryouts2026/checkin/' + playerKey(name)).set({
        name, grade, num, ts: Date.now()
      }).then(done);
    } else {
      done();
    }
  });

  closeModal();
}

function showModalError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── Password Gate ─────────────────────────────────────────────────────────────
const PW_HASH_CI = '9325b3a90d0a1b6d728a3428a28cbf88529f7cd19e9e61277383612b92da942d';
async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
if (sessionStorage.getItem('pld-checkin-auth') === 'true') {
  document.getElementById('pw-gate').classList.remove('visible');
}
async function submitGate() {
  const val = document.getElementById('pw-input').value;
  if (await sha256(val) === PW_HASH_CI) {
    sessionStorage.setItem('pld-checkin-auth', 'true');
    document.getElementById('pw-gate').classList.remove('visible');
  } else {
    const inp = document.getElementById('pw-input');
    inp.classList.add('error');
    document.getElementById('pw-error').textContent = 'Incorrect password.';
    setTimeout(() => inp.classList.remove('error'), 400);
    inp.value = ''; inp.focus();
  }
}

initFirebase();
